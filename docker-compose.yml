  allure-nginx:
    image: nginx:alpine
    container_name: allure-nginx
    volumes:
        - /home/***/allure-reports/latest:/usr/share/nginx/html:ro
    labels:
        - "traefik.enable=true"
        #- "traefik.http.routers.allure.rule=Host(`chaseqa.duckdns.org`) && PathPrefix(`/allure`)"
        #- "traefik.http.routers.allure-http.rule=Host(`chaseqa.duckdns.org`)"
        - "traefik.http.routers.allure.rule=Host(`chaseqa.duckdns.org`)"
        - "traefik.http.routers.allure.entrypoints=websecure"
        #- "traefik.http.routers.allure-http.entrypoints=web"
        - "traefik.http.services.allure.loadbalancer.server.port=80"
        #- "traefik.http.middlewares.allure-strip.stripprefix.prefixes=/allure"
        #- "traefik.http.routers.allure.middlewares=allure-strip"
        - "traefik.http.routers.allure.priority=100"
        - "traefik.http.routers.orangehrm.tls.certresolver=myresolver"
    networks:
        - web

  mariadb:
    image: mariadb:11.0
    container_name: orange_db
    environment:

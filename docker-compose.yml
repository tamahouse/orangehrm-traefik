version: "3.8"

services:

  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.email=your-email@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

    networks:
      - web

  orangehrm:
    image: tamahouse/orangehrm:${TAG}
    container_name: orangehrm

    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orangehrm.rule=Host(`chaseqa.duckdns.org`)"
      - "traefik.http.routers.orangehrm.entrypoints=websecure"
      - "traefik.http.routers.orangehrm.tls.certresolver=myresolver"

      # 👇 QUAN TRỌNG (thiếu trước đó)
      - "traefik.http.services.orangehrm.loadbalancer.server.port=80"

      # HTTP → HTTPS
      - "traefik.http.routers.orangehrm-http.rule=Host(`chaseqa.duckdns.org`)"
      - "traefik.http.routers.orangehrm-http.entrypoints=web"
      - "traefik.http.routers.orangehrm-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      
  # mariadb:
   #  image: mariadb:11.0
   #  container_name: orange_db
   #  restart: unless-stopped
   #  volumes:
   #    - ./db_orange:/var/lib/mysql
   #  environment:
   #    - MYSQL_ROOT_PASSWORD=orangehrm
   #    - MYSQL_ROOT_USER=root
   #    - MYSQL_DATABASE=orangehrm

  allure-nginx:
    image: nginx:alpine
    container_name: allure-nginx
    volumes:
      - /home/***/allure-reports:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.allure.rule=Host(`chaseq.duckdns.org`) && PathPrefix(`/allure`)"
      - "traefik.http.routers.allure.entrypoints=web"
      - "traefik.http.services.allure.loadbalancer.server.port=80"

      # 👇 strip /allure prefix
      - "traefik.http.middlewares.allure-stripprefix.stripprefix.prefixes=/allure"
      - "traefik.http.routers.allure.middlewares=allure-stripprefix"

  mariadb:
    image: mariadb:11.0
    container_name: orange_db
    environment:
      - MYSQL_ROOT_PASSWORD=orangehrm
      - MYSQL_ROOT_USER=root
      - MYSQL_DATABASE=orangehrm
    volumes:
      - mariadb_data:/var/lib/mysql
   

    networks:
      - web
      

# 👇 PHẢI nằm ngoài services
networks:
  web:
    name: web
    
volumes:
  mariadb_data:   
version: "3.8"

services:

  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.email=your-email@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

    networks:
      - web

  orangehrm:
    image: orangehrm/orangehrm
    container_name: orangehrm

    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orangehrm.rule=Host(`chaseqa.duckdns.org`)"
      - "traefik.http.routers.orangehrm.entrypoints=websecure"
      - "traefik.http.routers.orangehrm.tls.certresolver=myresolver"

      # 👇 QUAN TRỌNG (thiếu trước đó)
      - "traefik.http.services.orangehrm.loadbalancer.server.port=80"

      # HTTP → HTTPS
      - "traefik.http.routers.orangehrm-http.rule=Host(`chaseqa.duckdns.org`)"
      - "traefik.http.routers.orangehrm-http.entrypoints=web"
      - "traefik.http.routers.orangehrm-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

# 👇 PHẢI nằm ngoài services
networks:
  web:
    name: web
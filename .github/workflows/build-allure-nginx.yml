name: Build Allure Nginx

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: tamahouse/orangehrm-traefik
          fetch-depth: 2

      - name: Check image exists
        id: image
        run: |
          if docker manifest inspect tamahouse/allure-nginx:latest > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect infra changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -E '^(nginx/|docker/allure-nginx/|docker-compose.yml)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide build
        id: decision
        run: |
          if [ "${{ steps.image.outputs.exists }}" = "false" ] || \
             [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.decision.outputs.build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        if: steps.decision.outputs.build == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}
          
      - name: Debug files
        run: |
            pwd
            ls -la
            find . -maxdepth 3

      - name: Build and push
        if: steps.decision.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/allure-nginx/Dockerfile
          push: true
          tags: tamahouse/allure-nginx:latest

      - name: Skip build
        if: steps.decision.outputs.build != 'true'
        run: echo "No infra changes and image already exists"